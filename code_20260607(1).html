<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI立定跳远分析 - 体育课堂</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            max-height: 700px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            color: #fff;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header .logo {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo .icon {
            font-size: 1.8rem;
        }
        .header .student-info {
            font-size: 0.95rem;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .video-panel {
            flex: 4;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 12px;
            border-right: 1px solid var(--border);
            min-width: 0;
        }
        .video-wrapper {
            flex: 1;
            background: #0f172a;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .skeleton-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }
        .skeleton-overlay.active {
            display: block;
        }
        .placeholder {
            color: #94a3b8;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        .placeholder .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 12px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline.active {
            background: #eff6ff;
        }
        .btn-small {
            flex: 0.6;
            font-size: 0.9rem;
            padding: 10px 12px;
        }

        .report-panel {
            flex: 5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            min-width: 300px;
        }

        .score-card {
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 2px solid #dbeafe;
        }
        .score-big {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            min-width: 90px;
            text-align: center;
        }
        .score-meta .grade {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
        }
        .score-meta .time {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }
        .dimension-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .dimension-item .label {
            width: 75px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            text-align: right;
            flex-shrink: 0;
        }
        .dimension-item .bar-wrap {
            flex: 1;
            height: 22px;
            background: #f1f5f9;
            border-radius: 11px;
            overflow: hidden;
            position: relative;
        }
        .dimension-item .bar-fill {
            height: 100%;
            border-radius: 11px;
            transition: width 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
            display: flex;
            align-items: center;
            padding-left: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
        }
        .bar-fill.high {
            background: var(--success);
        }
        .bar-fill.mid {
            background: var(--warning);
        }
        .bar-fill.low {
            background: var(--danger);
        }
        .dimension-item .score-num {
            width: 36px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .star-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .star-row .star-label {
            width: 75px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: right;
            color: var(--text);
            flex-shrink: 0;
        }
        .star-row .stars {
            color: #f59e0b;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .star-row .stars .empty {
            color: #d1d5db;
        }
        .star-row .star-text {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-left: 4px;
        }

        .advice-box {
            background: #fffbeb;
            border: 1.5px solid #fde68a;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #92400e;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-shrink: 0;
        }
        .advice-box .bulb {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .analyzing-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            border-radius: 16px;
            z-index: 10;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }
            .video-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex: 3;
                min-height: 280px;
            }
            .report-panel {
                flex: 4;
            }
            .score-big {
                font-size: 2.8rem;
                min-width: 70px;
            }
            .btn {
                font-size: 0.85rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="icon">🏅</span> AI立定跳远分析
            </div>
            <div class="student-info" id="studentInfo">三(2)班 · 小明</div>
        </div>

        <div class="main">
            <div class="video-panel">
                <div class="video-wrapper" id="videoWrapper">
                    <video id="videoPlayer" controls playsinline></video>
                    <canvas id="skeletonCanvas" class="skeleton-overlay"></canvas>
                    <div class="placeholder" id="placeholder">
                        <span class="big-icon">📹</span>
                        点击下方按钮<br>拍摄或上传视频
                    </div>
                    <div class="analyzing-overlay hidden" id="analyzingOverlay">
                        <div class="spinner"></div>
                        <div>AI正在分析动作...</div>
                        <div style="font-size:0.8rem;opacity:0.7;margin-top:4px;">预计2秒完成</div>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-primary" id="btnUpload">📁 上传视频</button>
                    <button class="btn btn-outline" id="btnDemo">🎬 演示视频</button>
                    <button class="btn btn-outline btn-small" id="btnSkeleton">🦴 骨骼线</button>
                    <input type="file" id="fileInput" accept="video/*" style="display:none;">
                </div>
            </div>

            <div class="report-panel" id="reportPanel">
                <div class="score-card">
                    <div class="score-big" id="totalScore">--</div>
                    <div class="score-meta">
                        <div class="grade" id="gradeText">等待分析</div>
                        <div class="time" id="analyzeTime">请先上传视频</div>
                    </div>
                </div>

                <div>
                    <div class="section-title"><span class="dot"></span>核心维度评分</div>
                    <div id="coreDimensions">
                        <div class="dimension-item">
                            <span class="label">💪 摆臂充分度</span>
                            <div class="bar-wrap"><div class="bar-fill mid" id="barArm" style="width:0%">--</div></div>
                            <span class="score-num" id="scoreArm">--</span>
                        </div>
                        <div class="dimension-item">
                            <span class="label">🦵 蹬地有力度</span>
                            <div class="bar-wrap"><div class="bar-fill mid" id="barLeg" style="width:0%">--</div></div>
                            <span class="score-num" id="scoreLeg">--</span>
                        </div>
                        <div class="dimension-item">
                            <span class="label">🔄 动作协调性</span>
                            <div class="bar-wrap"><div class="bar-fill mid" id="barCoord" style="width:0%">--</div></div>
                            <span class="score-num" id="scoreCoord">--</span>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="section-title"><span class="dot"></span>辅助指标</div>
                    <div id="auxIndicators">
                        <div class="star-row">
                            <span class="star-label">🎯 落地稳定性</span>
                            <span class="stars" id="starsLand">★★★★★</span>
                            <span class="star-text" id="textLand">--</span>
                        </div>
                        <div class="star-row">
                            <span class="star-label">✈️ 腾空高度</span>
                            <span class="stars" id="starsAir">★★★★★</span>
                            <span class="star-text" id="textAir">--</span>
                        </div>
                        <div class="star-row">
                            <span class="star-label">🦵 收腹举腿</span>
                            <span class="stars" id="starsTuck">★★★★★</span>
                            <span class="star-text" id="textTuck">--</span>
                        </div>
                    </div>
                </div>

                <div class="advice-box" id="adviceBox">
                    <span class="bulb">💡</span>
                    <span id="adviceText">上传视频后，AI将自动分析并给出改进建议</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== DOM引用 ====================
        const videoPlayer = document.getElementById('videoPlayer');
        const skeletonCanvas = document.getElementById('skeletonCanvas');
        const placeholder = document.getElementById('placeholder');
        const analyzingOverlay = document.getElementById('analyzingOverlay');
        const videoWrapper = document.getElementById('videoWrapper');
        const btnUpload = document.getElementById('btnUpload');
        const btnDemo = document.getElementById('btnDemo');
        const btnSkeleton = document.getElementById('btnSkeleton');
        const fileInput = document.getElementById('fileInput');

        const totalScoreEl = document.getElementById('totalScore');
        const gradeTextEl = document.getElementById('gradeText');
        const analyzeTimeEl = document.getElementById('analyzeTime');
        const barArm = document.getElementById('barArm');
        const barLeg = document.getElementById('barLeg');
        const barCoord = document.getElementById('barCoord');
        const scoreArm = document.getElementById('scoreArm');
        const scoreLeg = document.getElementById('scoreLeg');
        const scoreCoord = document.getElementById('scoreCoord');
        const starsLand = document.getElementById('starsLand');
        const starsAir = document.getElementById('starsAir');
        const starsTuck = document.getElementById('starsTuck');
        const textLand = document.getElementById('textLand');
        const textAir = document.getElementById('textAir');
        const textTuck = document.getElementById('textTuck');
        const adviceText = document.getElementById('adviceText');

        let skeletonVisible = false;
        let currentVideoBlob = null;

        // ==================== 模拟AI分析 ====================
        function runAIAnalysis() {
            return new Promise((resolve) => {
                const delay = 1500 + Math.random() * 1000;
                setTimeout(() => {
                    const result = generateMockResult();
                    resolve(result);
                }, delay);
            });
        }

        function generateMockResult() {
            const arm = Math.floor(Math.random() * 35) + 63;
            const leg = Math.floor(Math.random() * 35) + 63;
            const coord = Math.floor(Math.random() * 35) + 63;
            const landing = Math.floor(Math.random() * 5) + 1;
            const air = Math.floor(Math.random() * 5) + 1;
            const tuck = Math.floor(Math.random() * 5) + 1;

            const total = Math.round(arm * 0.25 + leg * 0.35 + coord * 0.25 + (landing * 20) * 0.15);

            return {
                totalScore: Math.min(total, 99),
                dimensions: { arm, leg, coord },
                aux: {
                    landing: { stars: landing, text: landing >= 4 ? '稳定' : landing >= 3 ? '轻微晃动' : '需改进' },
                    air: { stars: air, text: air >= 4 ? '充分' : air >= 3 ? '一般' : '偏低' },
                    tuck: { stars: tuck, text: tuck >= 4 ? '充分' : tuck >= 3 ? '一般' : '不足' },
                },
            };
        }

        // ==================== UI更新 ====================
        function updateReport(result) {
            const { totalScore, dimensions, aux } = result;
            const { arm, leg, coord } = dimensions;

            totalScoreEl.textContent = totalScore;
            let grade;
            if (totalScore >= 90) grade = '🌟 优秀';
            else if (totalScore >= 80) grade = '👍 良好';
            else if (totalScore >= 70) grade = '✅ 达标';
            else grade = '🌱 继续加油';
            gradeTextEl.textContent = grade;
            const now = new Date();
            analyzeTimeEl.textContent =
                `分析时间：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            updateBar(barArm, scoreArm, arm);
            updateBar(barLeg, scoreLeg, leg);
            updateBar(barCoord, scoreCoord, coord);
            updateStars(starsLand, textLand, aux.landing);
            updateStars(starsAir, textAir, aux.air);
            updateStars(starsTuck, textTuck, aux.tuck);
            generateAdvice(result);
        }

        function updateBar(barEl, scoreEl, value) {
            barEl.style.width = value + '%';
            barEl.textContent = value;
            scoreEl.textContent = value;
            barEl.classList.remove('high', 'mid', 'low');
            if (value >= 85) barEl.classList.add('high');
            else if (value >= 70) barEl.classList.add('mid');
            else barEl.classList.add('low');
        }

        function updateStars(starsEl, textEl, data) {
            const { stars, text } = data;
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= stars ? '★' : '<span class="empty">★</span>';
            }
            starsEl.innerHTML = html;
            textEl.textContent = text;
        }

        function generateAdvice(result) {
            const { dimensions, aux } = result;
            const { arm, leg, coord } = dimensions;
            const advices = [];

            const minDim = Math.min(arm, leg, coord);
            if (arm === minDim && arm < 80) {
                advices.push('摆臂幅度可以再大一些，手臂后摆时尽量到身体后方，起跳时快速向上摆');
            }
            if (leg === minDim && leg < 80) {
                advices.push('起跳时大腿再往下蹲一点，像弹簧一样用力蹬地，会有更强的爆发力');
            }
            if (coord === minDim && coord < 80) {
                advices.push('注意摆臂和蹬地的配合，可以先练习"摆-蹬"的节奏感');
            }
            if (aux.landing.stars <= 2) {
                advices.push('落地时身体重心稍微前倾，双脚同时着地，膝盖微屈缓冲');
            }
            if (aux.tuck.stars <= 2) {
                advices.push('腾空后记得收腹，大腿往胸前靠，这样可以跳得更远');
            }

            if (advices.length === 0) {
                advices.push('动作非常标准！继续保持，可以挑战更远的目标距离');
            }

            adviceText.textContent = advices.join('；') + '。';
        }

        // ==================== 视频处理 ====================
        function loadVideo(file) {
            const url = URL.createObjectURL(file);
            currentVideoBlob = file;
            videoPlayer.src = url;
            videoPlayer.style.display = 'block';
            placeholder.classList.add('hidden');
            videoPlayer.onloadedmetadata = () => {
                videoPlayer.play().catch(() => {});
                triggerAnalysis();
            };
        }

        async function triggerAnalysis() {
            if (!currentVideoBlob && !videoPlayer.src) return;
            analyzingOverlay.classList.remove('hidden');
            try {
                const result = await runAIAnalysis();
                updateReport(result);
            } catch (e) {
                adviceText.textContent = '分析失败，请重试';
            } finally {
                analyzingOverlay.classList.add('hidden');
            }
        }

        // ==================== 按钮事件 ====================
        btnUpload.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadVideo(file);
            }
        });

        btnDemo.addEventListener('click', () => {
            placeholder.classList.add('hidden');
            videoPlayer.style.display = 'block';
            videoPlayer.poster =
                'data:image/svg+xml,' + encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="#1e293b" width="400" height="300"/><text fill="#94a3b8" x="200" y="155" text-anchor="middle" font-size="18">🎬 演示模式</text></svg>'
                    );
            videoPlayer.src = '';
            currentVideoBlob = new Blob(['demo'], { type: 'video/mp4' });
            triggerAnalysis();
        });

        btnSkeleton.addEventListener('click', () => {
            skeletonVisible = !skeletonVisible;
            const canvas = skeletonCanvas;
            if (skeletonVisible) {
                canvas.classList.add('active');
                btnSkeleton.classList.add('active');
                drawMockSkeleton();
            } else {
                canvas.classList.remove('active');
                btnSkeleton.classList.remove('active');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        // ==================== 模拟骨骼线 ====================
        function drawMockSkeleton() {
            const canvas = skeletonCanvas;
            const wrapper = videoWrapper;
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height * 0.45;

            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = 'rgba(16, 185, 129, 0.6)';
            ctx.shadowBlur = 8;

            const points = [
                { x: cx, y: cy - 80 },
                { x: cx, y: cy - 50 },
                { x: cx - 30, y: cy - 45 },
                { x: cx + 30, y: cy - 45 },
                { x: cx, y: cy },
                { x: cx - 20, y: cy + 5 },
                { x: cx + 20, y: cy + 5 },
                { x: cx - 25, y: cy + 60 },
                { x: cx + 25, y: cy + 60 },
                { x: cx - 20, y: cy + 120 },
                { x: cx + 20, y: cy + 120 },
            ];

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.lineTo(points[4].x, points[4].y);
            ctx.moveTo(points[1].x, points[1].y);
            ctx.lineTo(points[2].x, points[2].y);
            ctx.moveTo(points[1].x, points[1].y);
            ctx.lineTo(points[3].x, points[3].y);
            ctx.moveTo(points[4].x, points[4].y);
            ctx.lineTo(points[5].x, points[5].y);
            ctx.moveTo(points[4].x, points[4].y);
            ctx.lineTo(points[6].x, points[6].y);
            ctx.moveTo(points[5].x, points[5].y);
            ctx.lineTo(points[7].x, points[7].y);
            ctx.lineTo(points[9].x, points[9].y);
            ctx.moveTo(points[6].x, points[6].y);
            ctx.lineTo(points[8].x, points[8].y);
            ctx.lineTo(points[10].x, points[10].y);
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 6;
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#f59e0b';
            ctx.font = 'bold 14px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.shadowBlur = 4;
            ctx.fillText('起跳角度: 95°', cx - 60, cy + 50);
        }

        window.addEventListener('resize', () => {
            if (skeletonVisible) {
                drawMockSkeleton();
            }
        });

        // ==================== 拖拽上传 ====================
        videoWrapper.addEventListener('dragover', (e) => {
            e.preventDefault();
            videoWrapper.style.border = '3px dashed #2563eb';
        });
        videoWrapper.addEventListener('dragleave', () => {
            videoWrapper.style.border = '';
        });
        videoWrapper.addEventListener('drop', (e) => {
            e.preventDefault();
            videoWrapper.style.border = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                loadVideo(file);
            } else {
                alert('请拖入视频文件');
            }
        });

        console.log('🏅 AI立定跳远分析系统已就绪');
        console.log('📋 支持：上传视频 / 拖拽视频 / 演示模式');
        console.log('⏱️ 模拟分析时间：1.5~2.5秒');
    </script>
</body>
</html>
